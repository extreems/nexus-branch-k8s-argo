apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mariadb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/extreems/nexus-branch-k8s-argo.git
    targetRevision: main
    path: apps/mariadb
  destination:
    server: https://kubernetes.default.svc
    namespace: test-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true