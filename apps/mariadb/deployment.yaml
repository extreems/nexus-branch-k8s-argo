apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: test-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      initContainers:
      - name: init-datadir
        image: busybox
        command: ["sh", "-c", "rm -rf /var/lib/mysql/* /var/lib/mysql/..?* /var/lib/mysql/.[!.]*; echo cleaned"]
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      containers:
      - name: mariadb
        image: mariadb:11.4
        ports:
        - containerPort: 3306
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: root-password
        - name: MARIADB_DATABASE
          value: testdb
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      volumes:
      - name: data
        emptyDir: {}